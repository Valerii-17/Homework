<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Timer</title>

</head>
<body>
    <div class="container">
        
        <div class="input-group">
            <label for="secondsInput">Enter time in seconds:</label>
            <input type="number" id="secondsInput" value="85" min="1">
        </div>

        <div class="timer-display" id="display">01:25</div>

        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="stopBtn" disabled>Stop</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        class Timer {
            constructor(seconds, displayElement) {
                this.totalSeconds = seconds;
                this.remainingSeconds = seconds;
                this.displayElement = displayElement;

                this.intervalId = null;
                this.isRunning = false;

                this.display();
            }

            start() {
                if (this.isRunning) return;

                this.isRunning = true;

                this.intervalId = setInterval(() => {
                    if (this.remainingSeconds <= 0) {
                        this.stop();

                        startBtn.disabled = false;
                        stopBtn.disabled = true;
                        secondsInput.disabled = false;

                        return;
                    }

                    this.remainingSeconds--;
                    this.display();

                }, 1000);
            }

            stop() {
                clearInterval(this.intervalId);
                this.isRunning = false;
            }

            display() {
                const minutes = Math.floor(this.remainingSeconds / 60);
                const seconds = this.remainingSeconds % 60;

                const formattedTime =
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                this.displayElement.textContent = formattedTime;
            }

            reset(seconds = this.totalSeconds) {
                this.stop();

                this.totalSeconds = seconds;
                this.remainingSeconds = seconds;

                this.display();
            }
        }

        const secondsInput = document.querySelector('#secondsInput');
        const startBtn = document.querySelector('#startBtn');
        const stopBtn = document.querySelector('#stopBtn');
        const resetBtn = document.querySelector('#resetBtn');
        const display = document.querySelector('#display');

        let timer = new Timer(+secondsInput.value, display);

        secondsInput.addEventListener('change', () => {
            const newSeconds = +secondsInput.value;

            if (newSeconds > 0) {
                timer.reset(newSeconds);

                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });

        startBtn.addEventListener('click', () => {
            timer.start();

            startBtn.disabled = true;
            stopBtn.disabled = false;
            secondsInput.disabled = true;
        });

        stopBtn.addEventListener('click', () => {
            timer.stop();

            startBtn.disabled = false;
            stopBtn.disabled = true;
            secondsInput.disabled = false;
        });

        resetBtn.addEventListener('click', () => {
            timer.reset(+secondsInput.value);

            startBtn.disabled = false;
            stopBtn.disabled = true;
            secondsInput.disabled = false;
        });
    </script>
</body>
</html>
