<!--Homework 5.4-->
<script>
    let n = Number(prompt("Enter a number:"));

    let j = 2;
    let isPrime = n > 1;

    if (n <= 1) {
        isPrime = false;
    } else {
        do {
            if (n % j === 0 && j !== n) {
                isPrime = false;
            }
            j++;
        } while (j < n && isPrime);
    }

    console.log(isPrime ? "The number is prime" : "The number is not prime");
</script>
