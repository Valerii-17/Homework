<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="weather">

    <h2 class="city">City</h2>

    <div class="date-block">
        <div class="time"></div>
        <div class="date"></div>
    </div>

    <img class="weather-icon" src="" alt="weather icon">

    <div class="temperature">--°C</div>

    <div class="description">Loading...</div>

    <div id="feels"> Feels like:
        <div class="feels">--°C</div>
    </div>

    <div class="details">
        <p>Humidity: <span class="humidity">--</span>%</p>
        <p>Pressure: <span class="pressure">--</span> hPa</p>
        <p>Wind: <span class="wind">--</span> km/h</p>

    </div>

    <button class="refresh-btn">
        🔄
    </button>

</div>

<script src="script.js"></script>
</body>
</html>
