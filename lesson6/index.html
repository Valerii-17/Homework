<!--Homework 6.3-->
<script>
    const book = {
        contacts: [
            {
                name: "John",
                phone: 6195553322,
                email: "john@ex.com"
            },
            {
                name: "Kim",
                phone: 8582223355,
                email: "kim@ex.com"
            },
            {
                name: "Ben",
                phone: 6190000732,
                email: "ben@ex.com"
            }
        ],

        findContact(name) {
            return book.contacts.find(contact => contact.name === name);
        },

        addContact(newContact) {
            book.contacts.push(newContact);
        }
    };
    book.addContact({
        name: "Anna",
        phone: 8581234567,
        email: "anna@ex.com"
    });
    console.log(book.findContact("John"));
    console.log(book.contacts);
</script>
